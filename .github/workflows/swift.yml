name: Swift

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    types: [opened, reopened, synchronize]

jobs:
  tests:
    name: Test
    uses: swiftlang/github-workflows/.github/workflows/swift_package_test.yml@main
    with:
      linux_exclude_swift_versions: "[{\"swift_version\": \"5.9\"}, {\"swift_version\": \"5.10\"}, {\"swift_version\": \"6.0\"}, {\"swift_version\": \"6.1\"}, {\"swift_version\": \"6.2\"}, {\"swift_version\": \"nightly-main\"}]]"
      windows_exclude_swift_versions: "[{\"swift_version\": \"5.9\"}, {\"swift_version\": \"6.0\"}, {\"swift_version\": \"6.1\"}, {\"swift_version\": \"6.2\"}, {\"swift_version\": \"nightly-main\"}]"
      android_exclude_swift_versions: "[{\"swift_version\": \"nightly-main\"}]"
      enable_android_sdk_build: true
      enable_android_sdk_checks: true
